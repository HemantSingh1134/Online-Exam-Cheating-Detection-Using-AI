<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exam Page</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    .timer {
      font-size: 1.2rem;
      font-weight: bold;
    }

    .question-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      background-color: #f8f9fa;
    }

    .option-tile {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      margin: 5px 0;
      cursor: pointer;
    }

    .option-tile:hover,
    .selected {
      background-color: #0d6efd;
      color: white;
    }

    .submit-btn {
      background-color: #198754;
      color: white;
      font-size: 1.2rem;
    }

    #warning-alert {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      display: none;
      background-color: #ff0000;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container mt-5">
    <div class="row">
      <div class="col-md-8 offset-md-2">
        <h1 class="text-center mb-4 text-primary">Exam Portal</h1>

        <div class="text-center mb-3">
          <p>
            <strong>Full Marks:</strong> 100 |
            <strong>Pass Marks:</strong> 40
          </p>
        </div>

        <div class="alert alert-danger text-center" id="tab-warning">
          Tab Switches: <span id="tab-count">{{ tab_count }}</span>/<span id="tab-limit">{{ tab_switch_limit }}</span>
        </div>

        <div id="timer" class="timer text-center mb-3">
          Time Left: <span id="time"></span>
        </div>

        <form id="exam-form" method="post" action="{% url 'submit_exam' %}">
          {% csrf_token %}
          <input type="hidden" name="username" value="{{ user.first_name }}" />

          {% for question in questions %}
          <div class="question-card">
            <p class="question-text">
              <strong>{{ forloop.counter }}.</strong> {{ question.text }}
            </p>

            <div class="option-tile" onclick="selectOption(this, 'q{{ question.id }}a')">
              <input
                type="radio"
                name="answer_{{ question.id }}"
                id="q{{ question.id }}a"
                value="A"
                required
              />
              <label for="q{{ question.id }}a">A. {{ question.option_a }}</label>
            </div>

            <div class="option-tile" onclick="selectOption(this, 'q{{ question.id }}b')">
              <input
                type="radio"
                name="answer_{{ question.id }}"
                id="q{{ question.id }}b"
                value="B"
              />
              <label for="q{{ question.id }}b">B. {{ question.option_b }}</label>
            </div>

            <div class="option-tile" onclick="selectOption(this, 'q{{ question.id }}c')">
              <input
                type="radio"
                name="answer_{{ question.id }}"
                id="q{{ question.id }}c"
                value="C"
              />
              <label for="q{{ question.id }}c">C. {{ question.option_c }}</label>
            </div>

            <div class="option-tile" onclick="selectOption(this, 'q{{ question.id }}d')">
              <input
                type="radio"
                name="answer_{{ question.id }}"
                id="q{{ question.id }}d"
                value="D"
              />
              <label for="q{{ question.id }}d">D. {{ question.option_d }}</label>
            </div>
          </div>
          {% endfor %}

          <div class="text-center mt-4">
            <button type="submit" class="btn submit-btn">Submit Exam</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div id="warning-alert" class="alert"></div>

  <script>
    const examForm = document.getElementById("exam-form");
    const warningAlert = document.getElementById("warning-alert");
    const tabCountElement = document.getElementById("tab-count");
    const timerElement = document.getElementById("time");
    const tabSwitchUrl = "{% url 'record_tab_switch' %}";
    const warningUrl = "{% url 'get_warning' %}";
    const csrfToken = "{{ csrf_token }}";
    const tabSwitchLimit = {{ tab_switch_limit|default:"1" }};

    let totalTime = 5 * 60;
    let tabSwitchCount = {{ tab_count|default:"0" }};
    let lastVisibilityState = document.visibilityState;
    let isSubmittingExam = false;
    let isRecordingTabSwitch = false;
    let lastRecordedSwitchAt = 0;

    function showWarning(message) {
      warningAlert.textContent = message;
      warningAlert.style.display = "block";
    }

    function submitExamWithWarning(message, delay = 1500) {
      if (isSubmittingExam) {
        return;
      }

      isSubmittingExam = true;
      if (message) {
        showWarning(message);
      }
      window.onbeforeunload = null;
      document.removeEventListener("visibilitychange", tabSwitchHandler);

      setTimeout(() => {
        examForm.submit();
      }, delay);
    }

    function startTimer() {
      const timer = setInterval(() => {
        const minutes = Math.floor(totalTime / 60);
        const seconds = totalTime % 60;
        timerElement.textContent = `${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;

        if (totalTime === 0) {
          clearInterval(timer);
          submitExamWithWarning("Time's up! Submitting the exam.");
          return;
        }

        totalTime--;
      }, 1000);
    }

    function selectOption(optionTile, inputId) {
      const questionCard = optionTile.closest(".question-card");
      questionCard.querySelectorAll(".option-tile").forEach((tile) => {
        tile.classList.remove("selected");
      });
      optionTile.classList.add("selected");
      document.getElementById(inputId).checked = true;
    }

    function checkWarnings() {
      fetch(warningUrl)
        .then((response) => response.json())
        .then((data) => {
          if (data.warning) {
            showWarning(data.warning);
          }
        });
    }

    function tabSwitchHandler() {
      if (isSubmittingExam || isRecordingTabSwitch) {
        lastVisibilityState = document.visibilityState;
        return;
      }

      const isRealSwitch = lastVisibilityState === "visible" && document.visibilityState === "hidden";
      lastVisibilityState = document.visibilityState;

      if (!isRealSwitch) {
        return;
      }

      const now = Date.now();
      if (now - lastRecordedSwitchAt < 1000) {
        return;
      }

      lastRecordedSwitchAt = now;
      isRecordingTabSwitch = true;

      fetch(tabSwitchUrl, {
        method: "POST",
        headers: { "X-CSRFToken": csrfToken },
      })
        .then((response) => response.json())
        .then((data) => {
          tabSwitchCount = data.count ?? (tabSwitchCount + 1);
          tabCountElement.textContent = tabSwitchCount;

          if (data.auto_submit) {
            submitExamWithWarning(data.message || "Tab switch limit exceeded. Submitting exam.", 0);
            return;
          }

          if (tabSwitchCount >= tabSwitchLimit) {
            submitExamWithWarning("Tab switch limit exceeded. Submitting exam.", 0);
            return;
          }

          if (data.message) {
            showWarning(data.message);
          }
        })
        .catch((error) => {
          console.error("Error:", error);
        })
        .finally(() => {
          isRecordingTabSwitch = false;
        });
    }

    document.addEventListener("contextmenu", (event) => event.preventDefault());

    window.addEventListener("blur", () => {
      showWarning("You cannot switch tabs or windows during the exam!");
    });

    document.addEventListener("fullscreenchange", () => {
      if (!document.fullscreenElement && !isSubmittingExam) {
        showWarning("You cannot exit fullscreen mode during the exam!");
        document.documentElement.requestFullscreen().catch(() => {});
      }
    });

    document.addEventListener("visibilitychange", tabSwitchHandler);

    window.onbeforeunload = function () {
      return "You are in the middle of an exam! Are you sure you want to leave?";
    };

    examForm.addEventListener("submit", function () {
      isSubmittingExam = true;
      window.onbeforeunload = null;
      document.removeEventListener("visibilitychange", tabSwitchHandler);
    });

    document.documentElement.requestFullscreen().catch(() => {});
    setInterval(checkWarnings, 5000);
    startTimer();
  </script>
</body>
</html>
